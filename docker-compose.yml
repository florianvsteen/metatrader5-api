services:
  mt5:
    build:
      context: backend/mt5
      dockerfile: Dockerfile
    container_name: mt5
    volumes:
      - ./config:/config
    networks:
      - openclaw_shared
    restart: unless-stopped
    ports:
      - "6789:3000"   # VNC
      - "6868:5001"   # API
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB: ${POSTGRESS_DB}
      - POSTGRES_USER: ${POSTGRESS_USER}
      - POSTGRES_PASSWORD: ${POSTGRESS_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - openclaw_shared
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  django:
    build:
      context: backend/django
      dockerfile: Dockerfile
    container_name: django
    volumes:
      - static_volume:/app/staticfiles
    restart: unless-stopped
    ports:
      - "8120:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - openclaw_shared
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:6
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - openclaw_shared
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celery:
    build:
      context: backend/django
      dockerfile: Dockerfile
    container_name: celery
    command: celery -A app worker --loglevel=info --concurrency=3
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      - django
      - redis
    networks:
      - openclaw_shared
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celery-beat:
    build:
      context: backend/django
      dockerfile: Dockerfile
    container_name: celery-beat
    command: celery -A app beat --loglevel=info
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      - celery
      - redis
    networks:
      - openclaw_shared
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres-data: {}
  static_volume: {}

networks:
  openclaw_shared:
    external: true
